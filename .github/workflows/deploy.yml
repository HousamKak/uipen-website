name: deploy

# Deploys the static site to GitHub Pages on every push to main.
# Pages serves it from uipen.dev via the CNAME file at the repo root.
#
# First run will auto-enable Pages (via actions/configure-pages).
# No build step — the site is vanilla HTML/CSS/JS and ships as-is.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel a running deploy so the final
# artifact always wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: setup Pages
        uses: actions/configure-pages@v5

      - name: verify site structure
        # Fail fast if the three required files aren't present so a
        # broken commit doesn't ship silently.
        run: |
          test -s index.html
          test -s styles.css
          test -s script.js
          test -s CNAME
          echo "site files present:"
          ls -la

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
